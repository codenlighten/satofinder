# SatoFinder v2 — nginx static-site config.
#
# Lives at /etc/nginx/conf.d/satofinder.conf in the container. The Dockerfile
# also writes /etc/nginx/snippets/security-headers.conf with the security
# header set; every location below `include`s it so headers are uniform across
# every response (nginx's add_header does NOT cascade when a child location
# also uses add_header — without the snippet pattern, per-location overrides
# silently drop the server-level security headers).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # ---- compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/html text/css text/plain
        application/javascript application/json application/manifest+json
        image/svg+xml;

    # ---- routes ----
    # index.html and / : no cache, full security headers
    location = / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # service worker: never cache; Service-Worker-Allowed lets the SW claim
    # the whole origin even if served from a subpath in the future.
    location = /service-worker.js {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # PWA manifest: correct content-type + short cache
    location = /manifest.json {
        include /etc/nginx/snippets/security-headers.conf;
        types { } default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # help page: HTML, modest cache
    location = /help.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # static images: 1-day cache
    location ~* \.(png|jpg|jpeg|gif|svg|ico)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # everything else inherits the server-level fallback (security headers only)
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # ---- hygiene ----
    autoindex off;
    location ~ /\. { deny all; return 404; }
    location ~* \.(vault|env|bak|swp|sql)$ { deny all; return 404; }
}
