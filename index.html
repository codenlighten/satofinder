/*<<SATOFINDER-SCRIPT-BEGIN>>*/
'use strict';

// ====================== 03. CONSTANTS ======================
const VERSION = '2.4.0';

const ENDPOINTS = Object.freeze({
  woc: {
    balance:  (a) => `https://api.whatsonchain.com/v1/bsv/main/address/${encodeURIComponent(a)}/balance`,
    unspent:  (a) => `https://api.whatsonchain.com/v1/bsv/main/address/${encodeURIComponent(a)}/unspent`,
    history:  (a) => `https://api.whatsonchain.com/v1/bsv/main/address/${encodeURIComponent(a)}/history`,
    txInfo:   (h) => `https://api.whatsonchain.com/v1/bsv/main/tx/hash/${encodeURIComponent(h)}`,
    broadcast: 'https://api.whatsonchain.com/v1/bsv/main/tx/raw',
    price:     'https://api.whatsonchain.com/v1/bsv/main/exchangerate',
  },
  bitails: {
    unspentMulti: 'https://api.bitails.io/address/unspent/multi',
    historyMulti: 'https://api.bitails.io/address/history/multi',
  },
  // GorillaPool's 1Sat overlay (the per-address REST surface; distinct from
  // junglebus.gorillapool.io which is the subscription firehose). The /txos
  // endpoint classifies each output with origin.data.insc (inscription /
  // ordinal), origin.data.bsv20 (BSV-20 token), or origin.data.lock — any of
  // those three flags a UTXO that we MUST NOT spend as a plain sat or we
  // could burn an NFT / destroy a token. Hard-block on unavailability is the
  // safe default in Tokens.fetchProtected().
  gorillapool: {
    unspent:       (a) => `https://ordinals.gorillapool.io/api/txos/address/${encodeURIComponent(a)}/unspent`,
    bsv20Balance:  (a) => `https://ordinals.gorillapool.io/api/bsv20/${encodeURIComponent(a)}/balance`,
  },
});

// BIP path presets, mapped from the legacy walletType dropdown.
const PRESETS = Object.freeze({
  'default':     { bip: 44, coin: 0,   account: 0, label: 'Default BIP44 (m/44\'/0\'/0\'/0/i)' },
  'bip32basic':  { bip: 32, label: 'BIP32 basic (m/0\'/0\'/i)' },
  'atomic':      { bip: 44, coin: 145, account: 0, label: 'Atomic Wallet' },
  'exodus':      { bip: 44, coin: 236, account: 0, label: 'Exodus' },
  'keevo':       { bip: 44, coin: 236, account: 0, label: 'Keevo' },
  'moneybutton': { bip: 44, coin: 0,   account: 0, label: 'MoneyButton' },
  'relayx':      { bip: 44, coin: 236, account: 0, label: 'RelayX' },
  'simplycash':  { bip: 44, coin: 145, account: 0, label: 'SimplyCash' },
  'twetch':      { bip: 44, coin: 0,   account: 0, label: 'Twetch' },
});

const FEE_PER_KB = 50;          // sat/KB, conservative
const PBKDF2_ITER = 310000;     // OWASP 2023 minimum for PBKDF2-SHA256
const AUTOLOCK_MS = 10 * 60 * 1000;
const RECOVERY_DEPTH = 50;      // addresses scanned per branch (receive + change)
const BITAILS_BATCH = 20;       // per-request address count
const VAULT_KEY = 'satofinder.vault.v1';
const PREFS_KEY = 'satofinder.prefs.v1';
const TIPPING_ADDRESS = '139Gv2y2JcjCNdnJNS3kWGm36mjjespfQc';

// External inspector for a built-but-unbroadcast tx. WhatsOnChain's broadcast
// page also has a "Decode" mode that parses raw hex without sending — the
// user can paste the hex there to verify inputs, outputs, addresses, and fee
// against their expectation before flipping back here to confirm.
const WOC_INSPECT_URL = 'https://whatsonchain.com/broadcast';

// ====================== 04. CRYPTO ======================
// WebCrypto-only vault: PBKDF2-SHA256(password, salt) -> AES-GCM key, encrypt
// JSON blob (mnemonic + createdAt). Nothing else is persisted. Derivation prefs
// live in a separate non-encrypted PREFS_KEY because they're not sensitive.
const Crypto = {
  randomBytes(n) { return crypto.getRandomValues(new Uint8Array(n)); },

  async deriveKey(password, salt, iter = PBKDF2_ITER) {
    const base = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: iter, hash: 'SHA-256' },
      base, { name: 'AES-GCM', length: 256 }, false, ['encrypt','decrypt']);
  },

  b64enc(buf) {
    const u8 = buf instanceof Uint8Array ? buf : new Uint8Array(buf);
    let s = ''; for (let i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]);
    return btoa(s);
  },
  b64dec(s) {
    const bin = atob(s); const u8 = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    return u8;
  },

  async encrypt(password, plaintextStr) {
    const salt = Crypto.randomBytes(16);
    const iv   = Crypto.randomBytes(12);
    const key  = await Crypto.deriveKey(password, salt);
    const ct   = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintextStr));
    return {
      v: 1, kdf: 'PBKDF2-SHA256', iter: PBKDF2_ITER,
      salt: Crypto.b64enc(salt),
      iv:   Crypto.b64enc(iv),
      ct:   Crypto.b64enc(ct),
    };
  },

  async decrypt(password, blob) {
    if (!blob || blob.v !== 1) throw new Error('Unsupported vault format');
    const salt = Crypto.b64dec(blob.salt);
    const iv   = Crypto.b64dec(blob.iv);
    const ct   = Crypto.b64dec(blob.ct);
    const key  = await Crypto.deriveKey(password, salt, blob.iter || PBKDF2_ITER);
    let plain;
    try {
      plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    } catch {
      throw new Error('Wrong password');
    }
    return new TextDecoder().decode(plain);
  },
};

// Vault persistence — single localStorage key, no plaintext anywhere.
// Payload (v1) is JSON: { mnemonic, passphrase, createdAt }. The BIP39
// passphrase ("25th word") is part of the seed material — it MUST live in the
// encrypted blob alongside the mnemonic, or unlock would derive the wrong
// wallet. Pre-2.1 vaults are missing the `passphrase` key and default to ''.
const Vault = {
  exists() {
    try { return localStorage.getItem(VAULT_KEY) !== null; } catch { return false; }
  },
  read() {
    try { return JSON.parse(localStorage.getItem(VAULT_KEY)); } catch { return null; }
  },
  async save(mnemonic, password, passphrase = '') {
    const payload = JSON.stringify({ mnemonic, passphrase, createdAt: Date.now() });
    const blob = await Crypto.encrypt(password, payload);
    localStorage.setItem(VAULT_KEY, JSON.stringify(blob));
  },
  async unlock(password) {
    const blob = Vault.read();
    if (!blob) throw new Error('No vault on this device');
    const json = await Crypto.decrypt(password, blob);
    const obj = JSON.parse(json);
    if (!obj.mnemonic || typeof obj.mnemonic !== 'string') throw new Error('Vault payload corrupt');
    // Older (pre-2.1) vaults are missing the passphrase field — default to ''.
    return { mnemonic: obj.mnemonic, passphrase: typeof obj.passphrase === 'string' ? obj.passphrase : '' };
  },
  wipe() {
    localStorage.removeItem(VAULT_KEY);
    localStorage.removeItem(PREFS_KEY);
  },
};

// Cheap password-strength heuristic — no external lib. Returns 0..4 (zxcvbn-ish).
function passwordStrength(p) {
  if (!p) return 0;
  let s = 0;
  if (p.length >= 12) s++;
  if (p.length >= 16) s++;
  const classes = [/[a-z]/, /[A-Z]/, /[0-9]/, /[^A-Za-z0-9]/].filter(r => r.test(p)).length;
  if (classes >= 3) s++;
  if (classes >= 4 && p.length >= 14) s++;
  return Math.min(4, s);
}
const STRENGTH_LABEL = ['too weak', 'weak', 'fair', 'good', 'strong'];

// ====================== 05. STATE ======================
// Single mutable object + setState + subscribers. View machine fields
// (view, step, draft) hold UI-flow state so render fns stay pure.
const state = {
  // session
  locked: true,
  vaultExists: false,
  wallet: null,                            // { mnemonic, root: HDPrivateKey } — RAM only

  // view machine — drives renderApp dispatch:
  //   'landing' | 'create' | 'import' | 'unlock' | 'unlocked'
  view: 'landing',
  step: null,                              // sub-step inside a multi-screen flow
  draft: {},                               // transient inputs (mnemonic-in-progress, etc.)

  // derivation prefs (loaded from PREFS_KEY when present)
  bip: 44, coin: 0, account: 0, change: 0, addrIndex: 0,
  preset: 'default',
  derived: null,                           // { path, wif, pub, address }

  // network-derived
  price: null,                             // BSV/USD
  balance: null,                           // { confirmed, unconfirmed }
  history: [],
  recovery: null,
  tokens: null,                            // { address, ordinals: [], bsv20: [...] } | null


  // ui prefs
  hideKeys: true,

  // send flow — set by Actions.buildSend, cleared by cancel/broadcast
  draftTx: null,                           // { tx, hex, txid, to, sentSats, changeSats, fee, vsize }

  // ephemeral
  status: { kind: 'idle', msg: '' },
  busy: false,                             // disables interactive controls during async ops
};

const subscribers = new Set();
function subscribe(fn) { subscribers.add(fn); return () => subscribers.delete(fn); }
function setState(patch) {
  Object.assign(state, patch);
  for (const fn of subscribers) {
    try { fn(state); } catch (e) { console.error('subscriber error', e); }
  }
}

// ====================== 06. DERIVATION ======================
// Pure functions over a wallet root (bsv.HDPrivateKey). Builds BIP32 / BIP44
// paths from prefs, derives a child HDPrivateKey, and returns the address-set
// the keys panel renders. No DOM, no state — call from Actions and pass result.
const Derive = {
  pathFor(p) {
    if (p.bip === 32) return `m/0'/${p.change}'/${p.addrIndex}'`;
    return `m/44'/${p.coin}'/${p.account}'/${p.change}/${p.addrIndex}`;
  },
  derive(root, p) {
    const path = Derive.pathFor(p);
    const child = root.deriveChild(path);
    const priv  = child.privateKey;
    const pub   = bsv.PublicKey.fromPrivateKey(priv);
    const address = bsv.Address.fromPublicKey(pub).toString();
    return { path, wif: priv.toString(), pub: pub.toString(), address };
  },
};

// Transaction builder. Uses the two-pass fee pattern to avoid the legacy bug
// where _estimateFee() was called BEFORE outputs were added (index.html:1647
// in the old code) — the fee was systematically wrong. Here we build once at
// full amount, measure the real signed size, recompute the fee, then build
// again with the corrected output. Works for both single-recipient send and
// multi-UTXO recovery sweeps.
const TxBuilder = {
  // Build a single-recipient tx. `utxos` is an array shaped like WoC's
  // /address/unspent normalized to { txid, vout, satoshis, scriptHex }.
  // Returns { tx, hex, txid, fee, sentSats, changeSats }.
  // If `sentSats === 'max'`, sweeps the full input minus fee to `toAddress`
  // with no change output. Otherwise creates a change output back to fromAddress.
  send({ utxos, toAddress, sats, privateKey, fromAddress, feePerKb = FEE_PER_KB }) {
    if (!utxos || utxos.length === 0) throw new Error('No UTXOs to spend');
    if (!toAddress) throw new Error('No recipient address');
    const totalIn = utxos.reduce((a, u) => a + u.satoshis, 0);
    const isMax = sats === 'max';
    if (!isMax) {
      if (!Number.isInteger(sats) || sats <= 0) throw new Error('Amount must be a positive integer in sats');
      if (sats > totalIn) throw new Error('Amount exceeds spendable balance');
    }

    const inputs = utxos.map(u => ({
      txId: u.txid, outputIndex: u.vout,
      address: u.address || fromAddress,
      script: u.scriptHex || bsv.Script.buildPublicKeyHashOut(u.address || fromAddress).toHex(),
      satoshis: u.satoshis,
    }));

    // Pass 1: build with the chosen amount (or full input for max), sign, measure.
    const firstTo = isMax ? totalIn : sats;
    let t1 = new bsv.Transaction().from(inputs).feePerKb(feePerKb).to(toAddress, firstTo);
    if (!isMax) t1 = t1.change(fromAddress);
    t1.sign(privateKey);
    const vsize = t1.toBuffer().length;
    // 1 sat/byte safety pad on top of the standard rate to cover tiny ECDSA
    // signature length variations after the second-pass re-sign.
    const fee = Math.ceil((vsize * feePerKb) / 1000) + Math.ceil(vsize / 1000) + 10;

    // Pass 2: rebuild with the corrected amount.
    let sentSats, changeSats;
    let t2 = new bsv.Transaction().from(inputs).feePerKb(feePerKb);
    if (isMax) {
      sentSats = totalIn - fee;
      if (sentSats <= 546) throw new Error('Dust after fee — input too small to spend');
      t2 = t2.to(toAddress, sentSats);
      changeSats = 0;
    } else {
      sentSats = sats;
      changeSats = totalIn - sats - fee;
      if (changeSats < 0) throw new Error('Insufficient funds for amount + fee');
      t2 = t2.to(toAddress, sats);
      // Skip dust change outputs — fold into fee instead.
      if (changeSats > 546) t2 = t2.to(fromAddress, changeSats);
      else { changeSats = 0; }
    }
    t2.sign(privateKey);

    const hex = t2.toString();
    return { tx: t2, hex, txid: t2.hash, fee, sentSats, changeSats, vsize };
  },
};

// Non-sensitive prefs persistence. Keeps the user on their preferred derivation
// (preset, coin path, account, change, index, hideKeys toggle) across reloads.
// Mnemonic is NEVER stored here.
const Prefs = {
  load() {
    try { return JSON.parse(localStorage.getItem(PREFS_KEY)) || {}; }
    catch { return {}; }
  },
  save(p) {
    try {
      localStorage.setItem(PREFS_KEY, JSON.stringify({
        bip: p.bip, coin: p.coin, account: p.account,
        change: p.change, addrIndex: p.addrIndex,
        preset: p.preset, hideKeys: p.hideKeys,
      }));
    } catch {}
  },
};

// ====================== 07. NETWORK ======================
// All HTTP goes through api(): aborts after 15s, throws on non-2xx with the
// server's response body trimmed to 200 chars, parses JSON when possible
// (broadcast returns the txid as plain text, so we fall back to the raw body).
async function api(url, opts = {}) {
  const ctl = new AbortController();
  const timeout = opts.timeout ?? 15000;
  const t = setTimeout(() => ctl.abort(), timeout);
  try {
    const r = await fetch(url, { ...opts, signal: ctl.signal });
    const text = await r.text();
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}: ${text.slice(0, 200)}`);
    try { return JSON.parse(text); } catch { return text; }
  } finally {
    clearTimeout(t);
  }
}

// Thin helpers per provider. Keep response shapes normalized at this layer so
// callers don't need to know which provider answered.
const Net = {
  woc: {
    balance:    (a) => api(ENDPOINTS.woc.balance(a)),
    unspent:    (a) => api(ENDPOINTS.woc.unspent(a)),
    history:    (a) => api(ENDPOINTS.woc.history(a)),
    txInfo:     (h) => api(ENDPOINTS.woc.txInfo(h)),
    price:      ()  => api(ENDPOINTS.woc.price),
    broadcast:  (txHex) => api(ENDPOINTS.woc.broadcast, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ txhex: txHex }),
                }),
  },
  gorillapool: {
    unspent:      (a) => api(ENDPOINTS.gorillapool.unspent(a)),
    bsv20Balance: (a) => api(ENDPOINTS.gorillapool.bsv20Balance(a)),
  },
  bitails: {
    unspentMulti: (addrs) => api(ENDPOINTS.bitails.unspentMulti, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ addresses: addrs }),
                  }),
    historyMulti: (addrs) => api(ENDPOINTS.bitails.historyMulti, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ addresses: addrs }),
                  }),
  },
};

// Recovery: scan the first RECOVERY_DEPTH addresses on both receive (change=0)
// and change (change=1) branches under the current preset, fetch UTXOs in
// batches via bitails (the only provider with a multi-address endpoint), and
// fold the results into per-address records with derivation info attached so
// the user can sweep each one.
const Recovery = {
  // Returns [{ path, address, wif, utxos: [normalized], totalSats }]
  // for every scanned address that has at least one UTXO.
  async scan(root, prefs, opts = {}) {
    const depth = opts.depth || RECOVERY_DEPTH;
    const onProgress = opts.onProgress || (() => {});
    // 1. Derive depth*2 candidate addresses (both branches).
    const candidates = [];
    for (let i = 0; i < depth; i++) {
      for (const change of [0, 1]) {
        const p = { ...prefs, change, addrIndex: i };
        const d = Derive.derive(root, p);
        candidates.push(d);
      }
    }
    onProgress({ stage: 'derived', total: candidates.length });

    // 2. Query bitails multi-unspent in batches of BITAILS_BATCH.
    const found = [];
    for (let off = 0; off < candidates.length; off += BITAILS_BATCH) {
      const batch = candidates.slice(off, off + BITAILS_BATCH);
      const addrs = batch.map(c => c.address);
      onProgress({ stage: 'scanning', done: off, total: candidates.length });
      let resp;
      try {
        resp = await Net.bitails.unspentMulti(addrs);
      } catch (e) {
        throw new Error(`bitails scan failed at offset ${off}: ${e.message}`);
      }
      if (!Array.isArray(resp)) throw new Error('Unexpected bitails response shape');
      // Bitails returns per-address records; join back with derivation info.
      const byAddr = Object.create(null);
      for (const rec of resp) byAddr[rec.address] = rec;
      for (const c of batch) {
        const rec = byAddr[c.address];
        if (!rec || !Array.isArray(rec.unspent) || rec.unspent.length === 0) continue;
        const utxos = rec.unspent.map(u => ({
          txid: u.txid, vout: u.vout, satoshis: u.satoshis,
          address: c.address,
          scriptHex: bsv.Script.buildPublicKeyHashOut(c.address).toHex(),
        }));
        const totalSats = utxos.reduce((a, x) => a + x.satoshis, 0);
        found.push({ path: c.path, address: c.address, wif: c.wif, utxos, totalSats });
      }
    }
    onProgress({ stage: 'done', total: candidates.length, found: found.length });
    return found;
  },
};

// Tokens / ordinals classification. Wraps GorillaPool's 1Sat overlay
// (ordinals.gorillapool.io). Every Send and Sweep MUST call protectedSet()
// for the spend-side address before building a tx: if any UTXO in the WoC
// unspent list carries an inscription, a BSV-20 marker, or a lock, spending
// it as a plain sat would burn the NFT / destroy the token, so it must be
// filtered out of the spendable set.
//
// Hard policy: if the indexer is unreachable or returns a non-array, we
// THROW. Callers surface this as a block on the spend ("cannot verify your
// UTXOs are safe to spend"). No "I accept the risk" override in v2.4 —
// burning someone's NFT silently because an indexer was 503'd is exactly
// the failure mode we're trying to remove.
const Tokens = {
  // Is this 1Sat-overlay txo "protected" (must not be spent as plain sat)?
  isProtected(txo) {
    if (!txo || typeof txo !== 'object') return false;
    const o = txo.origin && txo.origin.data;
    if (!o) return false;
    return !!(o.insc || o.bsv20 || o.lock);
  },
  // Returns a Set of "txid:vout" strings for every protected UTXO at addr.
  // Throws on indexer error — callers MUST catch and block the spend.
  async protectedSet(addr) {
    let raw;
    try { raw = await Net.gorillapool.unspent(addr); }
    catch (e) { throw new Error(`Ordinal/token indexer unavailable (${e.message}). Refusing to build transaction — cannot verify UTXOs are safe to spend.`); }
    if (!Array.isArray(raw)) throw new Error('Ordinal/token indexer returned unexpected shape — refusing to build.');
    const set = new Set();
    for (const t of raw) {
      if (Tokens.isProtected(t)) set.add(`${t.txid}:${t.vout}`);
    }
    return set;
  },
  // Filter a normalized UTXO list against a protected Set. Returns
  // { spendable: [...], protectedCount: N }.
  filter(utxos, protectedSet) {
    const out = [];
    let pc = 0;
    for (const u of utxos) {
      if (protectedSet.has(`${u.txid}:${u.vout}`)) pc++; else out.push(u);
    }
    return { spendable: out, protectedCount: pc };
  },
  // Pretty-print the classification of a single ordinal txo (for the Tokens
  // panel). Pulls the most-useful fields out of the origin.data.{map,insc}
  // shape; everything via textContent at the render layer, so even
  // attacker-controlled `app`/`name` is rendered safely.
  describeOrdinal(txo) {
    const o = (txo.origin && txo.origin.data) || {};
    const m = o.map || {};
    const i = o.insc || {};
    const f = i.file || {};
    return {
      outpoint: txo.outpoint || `${txo.txid}:${txo.vout}`,
      satoshis: txo.satoshis,
      name: m.name || '',
      app:  m.app  || '',
      type: f.type || '',
      size: f.size || 0,
      num:  (txo.origin && txo.origin.num) || '',
    };
  },
};

// Normalize WoC's unspent shape into what TxBuilder expects. Keeps the
// builder provider-agnostic.
function normalizeWocUtxos(raw, address) {
  if (!Array.isArray(raw)) throw new Error('Unexpected unspent response');
  return raw.map(u => ({
    txid: u.tx_hash, vout: u.tx_pos, satoshis: u.value, address,
    scriptHex: bsv.Script.buildPublicKeyHashOut(address).toHex(),
  }));
}

// Address validity (network-aware via SDK). Returns true/false.
function isValidAddress(addr) {
  try { return !!bsv.Address.fromString(addr); } catch { return false; }
}

// Format helpers (pure, no DOM).
const Fmt = {
  sats: (n) => (n == null ? '' : new Intl.NumberFormat('en-US').format(n)),
  bsv:  (n) => (n == null ? '' : (n / 1e8).toFixed(8) + ' BSV'),
  usd:  (sats, rate) => {
    if (sats == null || rate == null) return '';
    const u = (sats * rate) / 1e8;
    return '$' + (u >= 0.01 ? u.toFixed(2) : u.toFixed(6));
  },
  shortHash: (h) => (h && h.length > 16 ? h.slice(0, 8) + '…' + h.slice(-8) : (h || '')),
  time: (unix) => {
    if (!unix) return '';
    try { return new Date(unix * 1000).toISOString().replace('T', ' ').slice(0, 16) + ' UTC'; }
    catch { return ''; }
  },
};

// ====================== 08. DOM ======================
function $(id) { return document.getElementById(id); }
function safeUrl(u) {
  const s = String(u);
  return /^(https?:|mailto:|#|\/)/.test(s) ? s : '#';
}
function el(tag, attrs = {}, children = []) {
  const n = document.createElement(tag);
  for (const k of Object.keys(attrs || {})) {
    const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === 'class')       n.className = v;
    else if (k === 'dataset') Object.assign(n.dataset, v);
    else if (k === 'style')   n.setAttribute('style', String(v));
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (k === 'href' || k === 'src') n.setAttribute(k, safeUrl(v));
    else n.setAttribute(k, String(v));
  }
  const kids = Array.isArray(children) ? children : [children];
  for (const c of kids) {
    if (c == null || c === false) continue;
    n.appendChild(typeof c === 'string' || typeof c === 'number'
      ? document.createTextNode(String(c)) : c);
  }
  return n;
}

// Per-panel renderers. Each owns one DOM region and is pure (state) => void.
// renderApp is a view dispatcher; the real per-section panels (keys, balance,
// send, history, recovery) arrive in later phases.
function renderApp(s) {
  const root = $('app');
  while (root.firstChild) root.removeChild(root.firstChild);
  let view;
  switch (s.view) {
    case 'landing':  view = renderLanding(s); break;
    case 'create':   view = renderCreate(s);  break;
    case 'import':   view = renderImport(s);  break;
    case 'unlock':   view = renderUnlock(s);  break;
    case 'unlocked': view = renderUnlockedPlaceholder(s); break;
    default:         view = renderLanding(s);
  }
  root.appendChild(view);
}

    ]),

}

function renderCreate(s) {

function renderPathPanel(s) {
  // Build per-field inputs. BIP32 has two editable hardened indices; BIP44 has
  // four indices (coin, account, change, addr). All trigger Actions.setPathField
  // on change, which re-derives and persists prefs.
  const isBip44 = s.bip === 44;
  const fields = isBip44
    ? [
        ['coin',      "coin'",     s.coin],
        ['account',   "account'",  s.account],
        ['change',    'change',    s.change],
        ['addrIndex', 'index',     s.addrIndex],
      ]
    : [
        ['change',    "external'", s.change],
        ['addrIndex', "index'",    s.addrIndex],
      ];
  const inputs = fields.map(([f, label, val]) => {
    const fid = 'path-' + f;
    return el('div', { style: 'flex:1;min-width:90px' }, [
      el('div', { class: 'muted', style: 'font-size:11px;margin-bottom:4px' }, label),
      el('input', {
        id: fid, type: 'number', min: 0, value: String(val),
        onchange: () => Actions.setPathField(f, $(fid).value),
      }),
    ]);
  });
  return el('div', { class: 'panel' }, [
    el('h2', {}, 'Derivation path'),
    el('div', { class: 'row', style: 'margin-bottom:8px' }, [
      el('button', { class: isBip44 ? 'primary' : '', onclick: () => Actions.setBip(44) }, 'BIP44'),
      el('button', { class: !isBip44 ? 'primary' : '', onclick: () => Actions.setBip(32) }, 'BIP32'),
    ]),
    el('div', { class: 'muted', style: 'margin-bottom:8px' }, [
      'Path: ',
      el('code', {}, Derive.pathFor(s)),
    ]),
    el('div', { class: 'row' }, inputs),
  ]);
}

    const v = $(pw1).value;

      el2.textContent = `Strength: ${STRENGTH_LABEL[score]} (${v.length} chars)`;
      el2.className = score >= 3 ? 'muted' : (score >= 2 ? 'warn' : 'err');

  // lives in draft — pass null so setPassword reads it from there. On Create,

  const isImport = origin === 'import';

// Status helpers used everywhere.
const Status = {
  info(msg)  { setState({ status: { kind: 'info',  msg } }); },
  error(msg) { setState({ status: { kind: 'error', msg } }); },
  clear()    { setState({ status: { kind: 'idle',  msg: '' } }); },
};

// ====================== 09. EVENTS / ACTIONS ======================
// All user-driven mutations go through Actions.* — each returns void, updates
// state via setState, and surfaces errors via Status.error. Render functions
// wire these as onclick handlers via el(...).
const Actions = {
  // ---- view navigation
  gotoLanding()  { Status.clear(); setState({ view: 'landing', step: null, draft: {} }); },
  gotoUnlock()   { Status.clear(); setState({ view: 'unlock',  step: null }); },
  gotoShow()     { setState({ view: 'create', step: 'show' }); },
  gotoConfirm()  { setState({ view: 'create', step: 'confirm' }); },

  // ---- create flow
  startCreate(entropyBits) {
    try {
      // bsv.Mnemonic.fromRandom(bits) takes an entropy bit count: 128/160/192/
      // 224/256 -> 12/15/18/21/24 words. The function's declared .length is 0
      // (minified varargs), so do NOT guard on .length — just pass the bits.
      const bits = (entropyBits === 256 || entropyBits === 224 || entropyBits === 192
                 || entropyBits === 160 || entropyBits === 128) ? entropyBits : 128;
      const m = bsv.Mnemonic.fromRandom(bits);
      const phrase = m.toString();
      // Sanity: BIP39 word counts per entropy bits. If the SDK ever ignored
      // our arg, surface it rather than silently shipping the wrong size.
      const expectedWords = { 128:12, 160:15, 192:18, 224:21, 256:24 }[bits];
      const gotWords = phrase.split(/\s+/).length;
      if (gotWords !== expectedWords) {
        throw new Error(`SDK returned ${gotWords} words; expected ${expectedWords} for ${bits}-bit entropy`);
      }
      setState({
        view: 'create', step: 'show',
        draft: { mnemonic: phrase, source: 'create', entropyBits: bits },
      });
    } catch (e) {
      Status.error(`Could not generate mnemonic: ${e.message}`);
    }
  },
  cancelCreate() { Actions.gotoLanding(); },

  checkLastWord(typed, expected) {
    if ((typed || '').trim().toLowerCase() !== (expected || '').trim().toLowerCase()) {
      Status.error('That word doesn\'t match — check your written copy.');
      return;
    }
    Status.clear();
    setState({ view: 'create', step: 'password' });
  },

  // ---- import flow
  startImport() {
    Status.clear();
    setState({ view: 'import', step: 'enter', draft: { source: 'import' } });
  },
  submitImport(text, passphrase) {
    const phrase = (text || '').trim().replace(/\s+/g, ' ').toLowerCase();
    const words = phrase.split(' ').filter(Boolean);
    if (words.length !== 12 && words.length !== 24) {
      Status.error(`Expected 12 or 24 words, got ${words.length}.`); return;
    }
    if (!bsv.Mnemonic.isValid(phrase)) {
      Status.error('Invalid BIP39 mnemonic (bad word or failed checksum).'); return;
    }
    Status.clear();
    setState({
      view: 'import', step: 'password',
      draft: { mnemonic: phrase, passphrase: passphrase || '', source: 'import' },
    });
  },

  // ---- password set (used by both create and import). Accepts an optional
  // BIP39 passphrase ("25th word") — different from pw1/pw2 which encrypt the
  // local vault. Both are stored in the encrypted vault blob.
  async setPassword(pw1, pw2, origin, bip39Pass) {
    if (!pw1 || pw1.length < 12) { Status.error('Password must be at least 12 characters.'); return; }
    if (pw1 !== pw2) { Status.error('Passwords do not match.'); return; }
    if (passwordStrength(pw1) < 2) { Status.error('Password is too weak — mix character classes and length.'); return; }
    const mnemonic = state.draft.mnemonic;
    if (!mnemonic) { Status.error('No mnemonic in flow — start over.'); Actions.gotoLanding(); return; }
    // On Create, the passphrase comes from this screen's input. On Import, it
    // was captured earlier on the mnemonic-entry screen and lives in draft.
    const passphrase = (typeof bip39Pass === 'string' ? bip39Pass : state.draft.passphrase) || '';

    setState({ busy: true });
    try {
      await Vault.save(mnemonic, pw1, passphrase);
      // Open the wallet straight from RAM rather than round-tripping.
      const wallet = Wallet.openFromMnemonic(mnemonic, passphrase);
      setState({
        wallet, locked: false, vaultExists: true,
        view: 'unlocked', step: null, draft: {},
        busy: false,
      });
      Actions._rederive();
      const passNote = passphrase ? ' (BIP39 passphrase set)' : '';
      Status.info((origin === 'import' ? 'Imported & unlocked.' : 'Wallet created & unlocked.') + passNote);
      AutoLock.arm();
    } catch (e) {
      setState({ busy: false });
      Status.error(`Could not save vault: ${e.message}`);
    }
  },

  // ---- unlock
  async unlock(password) {
    if (!password) { Status.error('Enter your password.'); return; }
    setState({ busy: true });
    try {
      const { mnemonic, passphrase } = await Vault.unlock(password);
      const wallet = Wallet.openFromMnemonic(mnemonic, passphrase);
      setState({
        wallet, locked: false, view: 'unlocked', step: null, busy: false,
      });
      Actions._rederive();
      Status.info('Unlocked.');
      AutoLock.arm();
    } catch (e) {
      setState({ busy: false });
      Status.error(e.message || 'Unlock failed.');
    }
  },

  // ---- lock / wipe
  lock() {
    setState({ wallet: null, locked: true, view: 'landing', step: null, draft: {} });
    AutoLock.disarm();
    Status.info('Locked.');
  },
  confirmWipe() {
    const typed = prompt('Type DELETE to wipe the local vault. This cannot be undone.');
    if (typed !== 'DELETE') { Status.info('Wipe cancelled.'); return; }
    Vault.wipe();
    setState({
      wallet: null, locked: true, vaultExists: false,
      view: 'landing', step: null, draft: {},
    });
    Status.info('Vault wiped.');
  },

  // ---- clipboard (no auto-copy — only on explicit click)
  async copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
      Status.info('Copied to clipboard.');
    } catch {
      Status.error('Clipboard copy failed (browser blocked it).');
    }
  },
  copy(text, label) {
    Actions.copyToClipboard(text).then(() => {
      if (label) Status.info(`${label} copied.`);
    });
  },

  // ---- derivation: preset / bip toggle / individual path fields
  // Each mutator re-derives synchronously and persists the (non-sensitive) prefs.
  setPreset(name) {
    const p = PRESETS[name];
    if (!p) return;
    const patch = { preset: name, bip: p.bip };
    if (p.bip === 44) {
      patch.coin = p.coin ?? 0;
      patch.account = p.account ?? 0;
      patch.change = 0;
      patch.addrIndex = 0;
    } else {
      patch.change = 0;
      patch.addrIndex = 0;
    }
    setState(patch);
    Actions._rederive();
  },
  setBip(b) {
    if (b !== 32 && b !== 44) return;
    setState({ bip: b, change: 0, addrIndex: 0,
               preset: b === 32 ? 'bip32basic' : 'default' });
    Actions._rederive();
  },
  setPathField(field, raw) {
    const n = Math.max(0, parseInt(raw, 10) || 0);
    if (!['coin','account','change','addrIndex'].includes(field)) return;
    setState({ [field]: n, preset: null });   // custom path -> no preset is active
    Actions._rederive();
  },
  toggleHideKeys() {
    setState({ hideKeys: !state.hideKeys });
    Prefs.save(state);
  },

  // Internal: re-derive from current wallet + prefs, save prefs, clear caches.
  _rederive() {
    if (!state.wallet || !state.wallet.root) return;
    try {
      const derived = Derive.derive(state.wallet.root, state);
      // Path change invalidates any address-scoped data (balance/history/tokens).
      setState({ derived, balance: null, history: [], tokens: null });
      Prefs.save(state);
    } catch (e) {
      Status.error(`Derivation failed: ${e.message}`);
    }
  },

  // ---- network: price (boot-time, best effort) / balance / history
  async fetchPrice() {
    try {
      const data = await Net.woc.price();
      if (data && typeof data.rate === 'number') setState({ price: data.rate });
    } catch (e) {
      // Non-fatal: just leaves USD column empty.
      console.warn('price fetch failed:', e.message);
    }
  },
  async refreshBalance() {
    if (!state.derived) { Status.error('No address derived.'); return; }
    setState({ busy: true });
    try {
      const data = await Net.woc.balance(state.derived.address);
      if (typeof data.confirmed !== 'number' || typeof data.unconfirmed !== 'number') {
        throw new Error('Unexpected balance response');
      }
      setState({ balance: { confirmed: data.confirmed, unconfirmed: data.unconfirmed }, busy: false });
      Status.clear();
      // Refresh price if we don't have it yet (cheap fallback).
      if (state.price == null) Actions.fetchPrice();
    } catch (e) {
      setState({ busy: false });
      Status.error(`Balance fetch failed: ${e.message}`);
    }
  },
  // ---- send flow: build (preview) then broadcast (confirm)
  async buildSend(toRaw, amtRaw) {
    Status.clear();
    if (!state.derived) { Status.error('No address derived.'); return; }
    const to = (toRaw || '').trim();
    if (!to) { Status.error('Enter a recipient address.'); return; }
    if (!isValidAddress(to)) { Status.error('Recipient address is not a valid BSV address.'); return; }
    const sats = parseInt(String(amtRaw).trim(), 10);
    if (!Number.isFinite(sats) || !Number.isInteger(sats) || sats <= 0) {
      Status.error('Amount must be a positive whole number of satoshis.');
      return;
    }
    if (sats < 546) { Status.error('Amount is below dust threshold (546 sats).'); return; }

    setState({ busy: true });
    try {
      // Fetch protected set FIRST. If the indexer is down we block entirely
      // (Tokens.protectedSet throws with a clear message); building anyway
      // could burn an NFT or destroy a token at this address.
      const protectedSet = await Tokens.protectedSet(state.derived.address);
      const raw = await Net.woc.unspent(state.derived.address);
      const allUtxos = normalizeWocUtxos(raw, state.derived.address);
      const { spendable, protectedCount } = Tokens.filter(allUtxos, protectedSet);
      if (spendable.length === 0) {
        throw new Error(protectedCount > 0
          ? `All ${protectedCount} UTXOs at this address carry ordinals or tokens (protected). Nothing safe to spend.`
          : 'No spendable UTXOs at this address.');
      }
      const priv = bsv.PrivateKey.fromWIF(state.derived.wif);
      const draft = TxBuilder.send({
        utxos: spendable, toAddress: to, sats,
        privateKey: priv, fromAddress: state.derived.address,
      });
      setState({
        draftTx: { ...draft, to, protectedCount, tx: undefined /* drop tx to keep state JSON-clean */ },
        busy: false,
      });
      Status.info(`Transaction built (${protectedCount} ordinal/token UTXOs protected). Review and confirm to broadcast.`);
    } catch (e) {
      setState({ busy: false });
      Status.error(`Build failed: ${e.message}`);
    }
  },
  cancelSend() { setState({ draftTx: null }); Status.info('Send cancelled.'); },
  async broadcastSend() {
    const d = state.draftTx;
    if (!d || !d.hex) { Status.error('No draft transaction.'); return; }
    setState({ busy: true });
    try {
      const txid = await Net.woc.broadcast(d.hex);
      const cleanTxid = typeof txid === 'string' ? txid.trim().replace(/^"|"$/g, '') : String(txid);
      setState({ draftTx: null, busy: false, balance: null });   // invalidate balance
      Status.info(`Broadcast OK. Txid: ${cleanTxid}`);
    } catch (e) {
      setState({ busy: false });
      Status.error(`Broadcast failed: ${e.message}`);
    }
  },

  // ---- recovery scan + sweep
  async scanRecovery() {
    if (!state.wallet || !state.wallet.root) { Status.error('Wallet locked.'); return; }
    setState({ busy: true, recovery: { scanning: true, done: 0, total: RECOVERY_DEPTH * 2 } });
    try {
      const onProgress = (p) => {
        if (p.stage === 'scanning') {
          setState({ recovery: { ...state.recovery, done: p.done, total: p.total } });
        }
      };
      const found = await Recovery.scan(state.wallet.root, state, { onProgress });
      const totalSats = found.reduce((a, x) => a + x.totalSats, 0);
      setState({
        busy: false,
        recovery: { scanning: false, found, totalSats, done: RECOVERY_DEPTH * 2, total: RECOVERY_DEPTH * 2 },
      });
      Status.info(found.length === 0 ? 'Recovery scan complete — nothing found.' : `Found ${found.length} addresses with ${Fmt.sats(totalSats)} sats.`);
    } catch (e) {
      setState({ busy: false });
      Status.error(`Recovery scan failed: ${e.message}`);
    }
  },
  // Resolves the recovery destination: user-edited value in state.draft if
  // any, else the current derived address. Returns the trimmed string (or '').
  _recoveryDest() {
    if (state.draft && typeof state.draft.recoveryDest === 'string') {
      return state.draft.recoveryDest.trim();
    }
    return state.derived ? state.derived.address : '';
  },
  // Pure-ish builder (no DOM, no broadcast). Throws on bad inputs / insufficient
  // funds / indexer down. Returns a sweep draft including protectedCount so the
  // UI can show "swept N sats, protected M ordinal/token UTXOs".
  async _buildSweepDraft(item, destAddress) {
    if (!destAddress) throw new Error('No destination — enter or derive an address first.');
    if (!isValidAddress(destAddress)) throw new Error('Destination is not a valid BSV address.');
    if (!item || !item.utxos || item.utxos.length === 0) throw new Error('Nothing to sweep.');
    // Indexer-down here = hard block. Burning an ordinal would be irreversible.
    const protectedSet = await Tokens.protectedSet(item.address);
    const { spendable, protectedCount } = Tokens.filter(item.utxos, protectedSet);
    if (spendable.length === 0) {
      throw new Error(protectedCount > 0
        ? `All ${protectedCount} UTXOs at ${item.address} carry ordinals or tokens (protected). Nothing safe to sweep.`
        : 'Nothing to sweep.');
    }
    const priv = bsv.PrivateKey.fromWIF(item.wif);
    const built = TxBuilder.send({
      utxos: spendable, toAddress: destAddress, sats: 'max',
      privateKey: priv, fromAddress: item.address,
    });
    return {
      path: item.path, fromAddress: item.address, to: destAddress,
      hex: built.hex, sentSats: built.sentSats, fee: built.fee, vsize: built.vsize,
      protectedCount,
    };
  },

  // Broadcast a previously-built sweep draft. Records per-path result so the
  // recovery row updates row-by-row.
  async _broadcastSweepDraft(draft) {
    try {
      const txidRaw = await Net.woc.broadcast(draft.hex);
      const txid = typeof txidRaw === 'string' ? txidRaw.trim().replace(/^"|"$/g, '') : String(txidRaw);
      const swept = { ...(state.draft && state.draft.swept ? state.draft.swept : {}) };
      swept[draft.path] = { ok: true, txid };
      setState({ draft: { ...state.draft, swept } });
      Status.info(`Swept ${Fmt.sats(draft.sentSats)} sats from ${draft.fromAddress} → ${Fmt.shortHash(draft.to)}: ${txid}`);
      return { ok: true, txid };
    } catch (e) {
      const swept = { ...(state.draft && state.draft.swept ? state.draft.swept : {}) };
      swept[draft.path] = { ok: false, error: e.message };
      setState({ draft: { ...state.draft, swept } });
      Status.error(`Sweep broadcast failed: ${e.message}`);
      return { ok: false, error: e.message };
    }
  },

  // Per-row Sweep button: build, but DO NOT broadcast yet. Stash the draft in
  // state.draft.sweepPreview so the recovery row inline-renders the hex
  // inspector + Confirm/Cancel. User can copy the hex to WhatsOnChain to
  // verify, then click Confirm to actually send.
  async previewSweep(item) {
    Status.clear();
    setState({ busy: true });
    try {
      const draft = await Actions._buildSweepDraft(item, Actions._recoveryDest());
      setState({
        busy: false,
        draft: { ...state.draft, sweepPreview: draft },
      });
      Status.info('Sweep transaction built. Review and confirm to broadcast.');
    } catch (e) {
      setState({ busy: false });
      Status.error(e.message);
    }
  },
  cancelSweepPreview() {
    const next = { ...state.draft }; delete next.sweepPreview;
    setState({ draft: next });
    Status.info('Sweep cancelled.');
  },
  async confirmSweepPreview() {
    const d = state.draft && state.draft.sweepPreview;
    if (!d) { Status.error('No sweep to confirm.'); return; }
    setState({ busy: true });
    try {
      await Actions._broadcastSweepDraft(d);
    } finally {
      const next = { ...state.draft }; delete next.sweepPreview;
      setState({ busy: false, draft: next });
    }
  },

  // Sweep every still-unswept recovery item to the configured destination.
  // Each item is broadcast as its own transaction (one per source address);
  // we don't combine across paths because each has a different private key.
  // Bypasses the per-row preview — the destination was already set explicitly
  // at the top of the panel, and click-through preview for N items would
  // defeat the bulk action. Failures on one item don't block the others.
  async sweepAllRecovered() {
    const rec = state.recovery;
    if (!rec || !rec.found || rec.found.length === 0) { Status.error('Nothing to sweep.'); return; }
    const destAddress = Actions._recoveryDest();
    if (!destAddress) { Status.error('No destination — enter or derive an address first.'); return; }
    if (!isValidAddress(destAddress)) { Status.error('Destination is not a valid BSV address.'); return; }
    const swept = (state.draft && state.draft.swept) || {};
    const pending = rec.found.filter(it => !swept[it.path]);
    if (pending.length === 0) { Status.info('All items already swept.'); return; }
    if (!confirm(`Sweep ${pending.length} address(es) to ${destAddress}? Each is a separate transaction (one fee per address). No per-item preview — use individual Sweep buttons for that.`)) return;

    setState({ busy: true });
    let ok = 0, fail = 0;
    for (const item of pending) {
      try {
        const draft = await Actions._buildSweepDraft(item, destAddress);
        const r = await Actions._broadcastSweepDraft(draft);
        if (r.ok) ok++; else fail++;
      } catch (e) {
        // Build failed (e.g., dust after fee on a tiny utxo). Record so row shows error.
        const sweptNow = { ...(state.draft && state.draft.swept ? state.draft.swept : {}) };
        sweptNow[item.path] = { ok: false, error: e.message };
        setState({ draft: { ...state.draft, swept: sweptNow } });
        fail++;
      }
    }
    setState({ busy: false });
    Status.info(`Sweep-all complete: ${ok} ok, ${fail} failed.`);
  },

  // ---- export: re-verify password before revealing mnemonic + passphrase
  async exportMnemonic(pw) {
    if (!pw) { Status.error('Enter your password.'); return; }
    setState({ busy: true });
    try {
      const { mnemonic, passphrase } = await Vault.unlock(pw);   // re-decrypts; throws on wrong pw
      setState({ busy: false, draft: {
        ...state.draft,
        exportedMnemonic: mnemonic,
        exportedPassphrase: passphrase || '',
      }});
      Status.info('Mnemonic revealed. Hide when done.');
    } catch (e) {
      setState({ busy: false });
      Status.error(e.message || 'Wrong password.');
    }
  },
  clearExport() {
    const next = { ...state.draft };
    delete next.exportedMnemonic;
    delete next.exportedPassphrase;
    setState({ draft: next });
    Status.clear();
  },
  // Download the existing encrypted vault blob as a JSON file. The file itself
  // is useless without the password; safe to email to yourself, archive, etc.
  downloadEncryptedBackup() {
    const blob = Vault.read();
    if (!blob) { Status.error('No vault to back up.'); return; }
    const data = new Blob([JSON.stringify(blob, null, 2)],
      { type: 'application/json' });
    const url = URL.createObjectURL(data);
    const a = el('a', { href: url, download: `satofinder-vault-${Date.now()}.json` });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    Status.info('Encrypted backup downloaded.');
  },

  async loadHistory() {
    if (!state.derived) { Status.error('No address derived.'); return; }
    setState({ busy: true });
    try {
      const data = await Net.woc.history(state.derived.address);
      if (!Array.isArray(data)) throw new Error('Unexpected history response');
      // Cap render at 100 most recent so the panel doesn't choke on busy
      // addresses; WoC returns oldest-first, so reverse + slice.
      const items = data.slice().reverse().slice(0, 100);
      setState({ history: items, busy: false });
      Status.info(items.length === 0 ? 'No transactions on this address.' : `${items.length} tx loaded.`);
    } catch (e) {
      setState({ busy: false });
      Status.error(`History fetch failed: ${e.message}`);
    }
  },

  // ---- tokens & ordinals (informational only — protection is enforced
  // automatically in buildSend / _buildSweepDraft regardless of this load).
  // Soft-fails: if the indexer is down here we surface an error but don't
  // wedge the wallet. The Send/Sweep paths still hard-block when the
  // indexer is down at spend time.
  async loadTokens() {
    if (!state.derived) { Status.error('No address derived.'); return; }
    const addr = state.derived.address;
    setState({ busy: true });
    try {
      const [rawTxos, rawBal] = await Promise.all([
        Net.gorillapool.unspent(addr),
        Net.gorillapool.bsv20Balance(addr).catch(() => []),  // bsv20 endpoint is allowed to noop
      ]);
      if (!Array.isArray(rawTxos)) throw new Error('Indexer returned unexpected shape.');
      const ordinals = rawTxos.filter(Tokens.isProtected).map(Tokens.describeOrdinal);
      // Normalize BSV-20 balance shape: array of { sym, dec, id, all: { confirmed }}
      const bsv20 = (Array.isArray(rawBal) ? rawBal : []).map(b => {
        const dec = Number(b.dec) || 0;
        const rawC = (b.all && (b.all.confirmed || b.all.pending)) || '0';
        const big = BigInt(rawC);
        const denom = BigInt(10) ** BigInt(dec || 0);
        const intPart = dec ? (big / denom).toString() : big.toString();
        const fracPart = dec ? (big % denom).toString().padStart(dec, '0').replace(/0+$/, '') : '';
        return {
          sym: String(b.sym || ''), id: String(b.id || ''), dec,
          amountRaw: rawC,
          amountStr: dec && fracPart ? `${intPart}.${fracPart}` : intPart,
        };
      });
      setState({ busy: false, tokens: { address: addr, ordinals, bsv20 } });
      const parts = [];
      if (ordinals.length) parts.push(`${ordinals.length} ordinal${ordinals.length === 1 ? '' : 's'}`);
      if (bsv20.length)    parts.push(`${bsv20.length} BSV-20 token${bsv20.length === 1 ? '' : 's'}`);
      Status.info(parts.length ? `Found ${parts.join(' + ')} at this address.` : 'No ordinals or BSV-20 tokens at this address.');
    } catch (e) {
      setState({ busy: false });
      Status.error(`Token lookup failed: ${e.message}`);
    }
  },
};

// Wallet: thin shell over the SDK, returned by Vault.unlock or setPassword.
// Stays in RAM only; never persisted. The BIP39 passphrase is part of the
// seed material; pass '' for no passphrase (the BIP39 default — same as
// other-wallet "I never set one").
const Wallet = {
  openFromMnemonic(phrase, passphrase = '') {
    const m = bsv.Mnemonic.fromString(phrase);
    const seed = m.toSeed(passphrase || '');   // BIP39 spec: empty -> salt is just "mnemonic"
    const root = bsv.HDPrivateKey.fromSeed(seed);
    return { mnemonic: phrase, passphrase: passphrase || '', root };
  },
};

// Auto-lock: clear the in-RAM wallet after AUTOLOCK_MS of inactivity (or when
// the tab becomes hidden, which is more aggressive). User can opt out by
// staying interactive.
const AutoLock = {
  _timer: null,
  arm() {
    AutoLock.disarm();
    AutoLock._timer = setTimeout(() => {
      if (!state.locked) Actions.lock();
    }, AUTOLOCK_MS);
  },
  disarm() {
    if (AutoLock._timer) { clearTimeout(AutoLock._timer); AutoLock._timer = null; }
  },
  bump() { if (!state.locked) AutoLock.arm(); },
};

function wireGlobalEvents() {
  // Reset idle timer on any interaction.
  for (const ev of ['mousemove','keydown','touchstart','focus']) {
    window.addEventListener(ev, AutoLock.bump, { passive: true });
  }
  // Lock when tab is hidden — safer than waiting for the idle timeout.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden' && !state.locked) Actions.lock();
  });
}

// ====================== 10. BOOT ======================
function boot() {
  // Sanity: required SDK globals must be present after SRI-pinned CDN loads.
  const missing = ['bsv'].filter(g => typeof window[g] === 'undefined');
  if (missing.length) {
    Status.error(`SDK not loaded: ${missing.join(', ')} — check CDN/SRI integrity.`);
    return;
  }
  if (typeof bsv.Mnemonic !== 'function') {
    Status.error('bsv.Mnemonic missing — bsv-mnemonic.min.js failed SRI or to load.');
  }
  subscribe(renderApp);
  subscribe(renderStatusBar);
  const prefs = Prefs.load();
  setState({
    vaultExists: Vault.exists(),
    view: 'landing',
    locked: true,
    bip:      typeof prefs.bip       === 'number' ? prefs.bip       : 44,
    coin:     typeof prefs.coin      === 'number' ? prefs.coin      : 0,
    account:  typeof prefs.account   === 'number' ? prefs.account   : 0,
    change:   typeof prefs.change    === 'number' ? prefs.change    : 0,
    addrIndex: typeof prefs.addrIndex === 'number' ? prefs.addrIndex : 0,
    preset:   typeof prefs.preset    === 'string' ? prefs.preset    : 'default',
    hideKeys: typeof prefs.hideKeys  === 'boolean' ? prefs.hideKeys : true,
  });
  wireGlobalEvents();
  // Fetch BSV price once at boot; non-fatal if it fails.
  Actions.fetchPrice();
  // Register service worker for offline + version-pinned CDN cache.
  // Skipped on file:// and any context where SW isn't available.
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('./service-worker.js').then(
      reg => console.info('SW registered, scope', reg.scope),
      err => console.warn('SW registration failed', err.message));
  }
  console.info(`SatoFinder ${VERSION} booted`);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot, { once: true });
} else {
  boot();
}
/*<<SATOFINDER-SCRIPT-END>>*/
  </script>
</body>
</html>
