<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bsv unpkg  cdn-->
    <script src="https://unpkg.com/bsv@1.5"></script>
    <title>Simple Private Key Import</title>
    <style>
      body {
        font-family: sans-serif;
      }
      #main {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #importWif {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px;
      }
      #results {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px;
      }
      #sendBsv {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px;
      }
      input {
        margin: 5px;
      }
      button {
        margin: 5px;
      }

      #address {
        word-wrap: break-word;
      }

      #publicKey {
        word-wrap: break-word;
      }

      #privateKey {
        word-wrap: break-word;
      }

      #results {
        display: none;
      }

      #sendBsv {
        display: none;
      }
      #txResults {
        word-wrap: break-word;
        display: none;
      }

      #importWifBtn {
        background-color: #4caf50;
        border: none;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
      }

      #sendBsvBtn {
        background-color: #4caf50;
        border: none;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
      }
      /* hover */
      #importWifBtn:hover {
        background-color: #3e8e41;
      }

      #sendBsvBtn:hover {
        background-color: #3e8e41;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <h1>Simple BSV Self-Custody Private Key Import</h1>
      <div id="importWif">
        <h2>Import WIF</h2>
        <input type="text" id="wif" placeholder="Enter WIF" />
        <button id="importWifBtn">Import</button>
      </div>
      <div id="results">
        <h2>Results</h2>
        <div id="address"></div>
        <div id="publicKey"></div>
        <div id="privateKey"></div>
        <div id="balance"></div>
      </div>
      <div id="sendBsv">
        <h2>Send BSV</h2>
        <input type="text" id="toAddress" placeholder="Enter Address" />
        <input type="text" id="amount" placeholder="Enter Amount" />
        <button id="sendBsvBtn">Send</button>
      </div>
      <div id="txResults"></div>
    </div>
    <script>
      const balance = async (address) => {
        const response = await fetch(
          `https://api.whatsonchain.com/v1/bsv/main/address/${address}/balance`
        );
        const json = await response.json();
        return json.confirmed + json.unconfirmed;
      };
      const getutxos = async (address) => {
        const response = await fetch(
          `https://api.whatsonchain.com/v1/bsv/main/address/${address}/unspent`
        );
        const json = await response.json();
        const utxos = json.map((utxo) => {
          return {
            txid: utxo.tx_hash,
            vout: utxo.tx_pos,
            satoshis: utxo.value,
            script: bsv.Script.buildPublicKeyHashOut(address).toHex(),
          };
        });
        return utxos;
      };

      const broadcast = async (tx) => {
        const response = await fetch(
          `https://api.whatsonchain.com/v1/bsv/main/tx/raw`,
          {
            method: "POST",
            body: JSON.stringify({ txhex: tx }),
          }
        );
        const json = await response.json();
        return json;
      };

      const sendBsv = async (toAddress, amount, privateKey) => {
        try {
          const privKey = bsv.PrivateKey.fromWIF(privateKey);
          const fundingAddress = privKey.toAddress().toString();
          const utxos = await getutxos(fundingAddress);
          console.log(utxos);
          const tx = new bsv.Transaction()
            .from(utxos)
            .to(toAddress, parseInt(amount))
            .feePerKb(15);
          const estFee = tx._estimateFee();
          const change = tx.inputAmount - tx.outputAmount - estFee;
          tx.to(fundingAddress, change);
          tx.sign(privKey);
          const txid = await broadcast(tx.toString());
          return txid;
        } catch (e) {
          console.log(e);
        }
      };

      const importWif = (wif) => {
        const privateKey = bsv.PrivateKey.fromWIF(wif);
        const address = privateKey.toAddress().toString();
        const publicKey = privateKey.toPublicKey().toString();
        return { privateKey, address, publicKey };
      };

      const importWifBtn = document.getElementById("importWifBtn");
      const sendBsvBtn = document.getElementById("sendBsvBtn");

      importWifBtn.addEventListener("click", async () => {
        const wif = document.getElementById("wif").value;
        const { privateKey, address, publicKey } = importWif(wif);
        document.getElementById(
          "address"
        ).innerHTML = `<b>Address:</b> ${address}`;
        document.getElementById(
          "publicKey"
        ).innerHTML = `<b>Public Key:</b> ${publicKey}`;
        document.getElementById(
          "privateKey"
        ).innerHTML = `<b>Private Key:</b> ${privateKey.toString()}`;
        document.getElementById("results").style.display = "flex";
        document.getElementById("sendBsv").style.display = "flex";
        //balance
        const balanceValue = await balance(address);
        document.getElementById(
          "balance"
        ).innerHTML = `<b>Balance:</b> ${balanceValue}`;
      });

      sendBsvBtn.addEventListener("click", async () => {
        try {
          const toAddress = document.getElementById("toAddress").value;
          const amount = document.getElementById("amount").value;
          const wif = document
            .getElementById("privateKey")
            .innerHTML.split(" ")[2];
          const txid = await sendBsv(toAddress, amount, wif);
          console.log(txid);
          document.getElementById(
            "txResults"
          ).innerHTML = `<b>Transaction ID:</b><a href="https://whatsonchain.com/tx/${txid}" target="_blank">${txid}</a>`;
          document.getElementById("txResults").style.display = "flex";
        } catch (e) {
          console.log(e);
          alert("Error");
        }
      });
    </script>
  </body>
</html>
